name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=boundless-profit-explorer --commit-dirty=true
        env:
          # KV namespace IDs are set here so wrangler can bind them at deploy time.
          # Create the namespaces once with:
          #   wrangler kv namespace create EPOCHS_CACHE
          #   wrangler kv namespace create EPOCHS_CACHE --preview
          # Then set these secrets in the repo settings.
          CLOUDFLARE_KV_EPOCHS_CACHE_ID: ${{ secrets.CLOUDFLARE_KV_EPOCHS_CACHE_ID }}
          CLOUDFLARE_KV_EPOCHS_CACHE_PREVIEW_ID: ${{ secrets.CLOUDFLARE_KV_EPOCHS_CACHE_PREVIEW_ID }}
