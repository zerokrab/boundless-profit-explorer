<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Body -->
  <ellipse cx="32" cy="36" rx="16" ry="12" fill="#06b6d4"/>
  <!-- Left claw -->
  <ellipse cx="10" cy="30" rx="6" ry="4" fill="#06b6d4" transform="rotate(-20 10 30)"/>
  <ellipse cx="5" cy="24" rx="4" ry="3" fill="#06b6d4" transform="rotate(-40 5 24)"/>
  <!-- Right claw -->
  <ellipse cx="54" cy="30" rx="6" ry="4" fill="#06b6d4" transform="rotate(20 54 30)"/>
  <ellipse cx="59" cy="24" rx="4" ry="3" fill="#06b6d4" transform="rotate(40 59 24)"/>
  <!-- Left legs -->
  <line x1="18" y1="38" x2="8" y2="44" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="42" x2="7" y2="50" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="46" y1="38" x2="56" y2="44" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <line x1="47" y1="42" x2="57" y2="50" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <!-- Eyes on stalks -->
  <line x1="26" y1="24" x2="23" y2="18" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="23" cy="16" r="3.5" fill="#0e7490"/>
  <circle cx="23" cy="16" r="1.5" fill="#fff"/>
  <line x1="38" y1="24" x2="41" y2="18" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="41" cy="16" r="3.5" fill="#0e7490"/>
  <circle cx="41" cy="16" r="1.5" fill="#fff"/>
  <!-- Shell pattern dots -->
  <circle cx="28" cy="36" r="2" fill="#0e7490" opacity="0.6"/>
  <circle cx="36" cy="36" r="2" fill="#0e7490" opacity="0.6"/>
  <circle cx="32" cy="42" r="2" fill="#0e7490" opacity="0.6"/>
</svg>
