<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#050a07"/>
  <!-- Body hexagon -->
  <polygon points="16,4 24,9 24,19 16,24 8,19 8,9"
    fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Eye stalks -->
  <line x1="13" y1="6" x2="11" y2="2" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="6" x2="21" y2="2" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="11" cy="1.5" r="2" fill="#00ff88"/>
  <circle cx="21" cy="1.5" r="2" fill="#00ff88"/>
  <!-- Left claw -->
  <line x1="8"  y1="11" x2="3"  y2="8"  stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3"  y1="8"  x2="0.5" y2="6" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3"  y1="8"  x2="0.5" y2="10" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right claw -->
  <line x1="24" y1="11" x2="29" y2="8"  stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="8"  x2="31.5" y2="6" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="29" y1="8"  x2="31.5" y2="10" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="9"  y1="15" x2="4"  y2="17" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="9"  y1="18" x2="4"  y2="22" stroke="#00ff88" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>
  <line x1="23" y1="15" x2="28" y2="17" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="23" y1="18" x2="28" y2="22" stroke="#00ff88" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>
  <!-- ZK core -->
  <circle cx="16" cy="14" r="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="16" y="17" text-anchor="middle" font-family="monospace" font-size="4.5" fill="#00ff88">ZK</text>
</svg>
